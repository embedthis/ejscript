#
#   Release - verify the tree and cut a tagged GitHub release with the tarball.
#
#   This workflow deliberately does NOT publish to npm. Publishing is a manual
#   step, run explicitly from a developer machine with `make promote`. Do not
#   add an npm publish job here.
#
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release. Must match package.json (e.g. 2.1.0)'
        required: true
      dry-run:
        description: 'Build, test and pack only. Do not tag or create a release.'
        type: boolean
        default: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install TestMe
        run: bun install -g --trust @embedthis/testme

      - name: Install dependencies
        run: bun install

      - name: Verify requested version matches package.json
        run: |
          requested="${{ github.event.inputs.version }}"
          actual=$(node -p "require('./package.json').version")
          if [ "$requested" != "$actual" ]; then
            echo "::error::Requested version $requested does not match package.json version $actual"
            exit 1
          fi
          echo "Releasing $(node -p "require('./package.json').name")@$actual"

      - name: Verify version is not already published
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "::error::$name@$version is already published"
            exit 1
          fi

      - name: Type check
        run: bun run typecheck

      - name: Run test suite
        run: |
          bin/prep-test.sh
          tm -v test

      - name: Build
        run: bun run build

      - name: Pack and inspect tarball
        run: |
          npm pack --ignore-scripts
          echo "--- tarball contents ---"
          tar -tzf *.tgz

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: '*.tgz'

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event.inputs.dry-run != 'true' }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: package-tarball

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: '*.tgz'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
