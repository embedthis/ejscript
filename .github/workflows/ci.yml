name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun-version: [latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install TestMe
        if: true
        run: |
          bun install -g --trust @embedthis/testme

      - name: Local TestMe
        if: false
        run: |
          bun install --verbose -g --trust "${{ github.workspace }}/local/testme.tgz"

      - name: Verify TestMe installation (Unix)
        if: runner.os != 'Windows'
        run: |
          tm --version

      - name: Verify TestMe installation (Windows)
        if: runner.os == 'Windows'
        run: |
          tm.exe --version
          # Get-ChildItem -Recurse -Path "C:\Program Files\OpenSSL"

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Run test suite (Unix)
        if: runner.os != 'Windows'
        run: |
          bin/prep-test.sh
          tm -v test

      - name: Run test suite (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call bin\test-prep.bat
          tm -v test

      - name: Build
        run: bun run build

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: success()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

