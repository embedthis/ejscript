name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun-version: [latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install TestMe
        run: bun install -g --trust @embedthis/testme

      - name: Verify TestMe installation (Unix)
        if: runner.os != 'Windows'
        run: tm --version

      - name: Verify TestMe installation (Windows)
        if: runner.os == 'Windows'
        run: tm.exe --version

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Run test suite (Unix)
        if: runner.os != 'Windows'
        run: |
          bin/prep-test.sh
          tm -v test

      #
      #   Windows deliberately runs only cmd.tst rather than the full suite.
      #   The remaining tests are not yet verified on Windows; widening this
      #   is tracked as future work. Do not assume the full suite passes here.
      #
      - name: Run test suite (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call bin\prep-test.bat
          tm -v test/cmd.tst

      - name: Build
        run: bun run build
